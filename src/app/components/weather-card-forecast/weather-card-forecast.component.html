<div class="forecast-card">
  <h3>{{ 'weather.forecast-title' | translate }}</h3>

  @for (dia of previsoes; track dia.dia) {
  <div class="forecast-item">
    <div>
      {{ dia.dia | translate }}
    </div>
    <div>
      {{ dia.icone }}
    </div>
    <div>{{ dia.temperaturaMinima }}°C</div>
    -
    <div>{{ dia.temperaturaMaxima }}°C</div>

  </div>
  }
</div>
