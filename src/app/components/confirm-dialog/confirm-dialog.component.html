@if (dialogService.visivel()) {
  <div class="overlay-backdrop" (click)="dialogService.responder(false)">
    <div
      class="confirm-dialog card-elevated"
      role="alertdialog"
      aria-modal="true"
      [attr.aria-label]="dialogService.dados()?.titulo"
      (click)="$event.stopPropagation()"
    >
      <h3>{{ dialogService.dados()?.titulo }}</h3>
      <p>{{ dialogService.dados()?.mensagem }}</p>

      <div class="confirm-dialog__actions">
        <button
          type="button"
          class="confirm-dialog__btn confirm-dialog__btn--cancel"
          (click)="dialogService.responder(false)"
        >
          {{ dialogService.dados()?.textoBotaoCancelar ?? ('dialog.btn-cancel' | translate) }}
        </button>
        <button
          type="button"
          class="confirm-dialog__btn confirm-dialog__btn--confirm"
          (click)="dialogService.responder(true)"
        >
          {{ dialogService.dados()?.textoBotaoConfirmar ?? ('dialog.btn-confirm' | translate) }}
        </button>
      </div>
    </div>
  </div>
}
