<div class="forgot-container auth-bg">
  <div class="forgot-card glass-card">
    <div class="logo" role="img" aria-label="Logo O Campista"></div>

    <h2>Recuperar senha</h2>

    <p>Digite seu e-mail e enviaremos instruções para resetar a senha.</p>

    <form [formGroup]="form" (ngSubmit)="enviarRecuperacao()">
      <label for="forgot-email" class="sr-only">E-mail</label>
      <input id="forgot-email" formControlName="email" type="email" placeholder="E-mail" autocomplete="email" />

      <button type="submit" [disabled]="loading">
        @if (loading) {
          Enviando...
        } @else {
          Enviar instruções
        }
      </button>

      @if (enviado) {
        <p class="sucesso" role="status">Enviamos as instruções para o seu e-mail.</p>
      }
    </form>

    <button type="button" class="back-button" (click)="voltarParaLogin()">
      &#8592; Voltar para login
    </button>
  </div>
</div>
