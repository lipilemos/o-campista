<div class="forgot-container auth-bg">

    <div class="forgot-card glass-card">

        <div class="logo"></div>

        <h2>Recuperar senha</h2>

        <p>Digite seu e-mail e enviaremos instruções para resetar a senha.</p>

        <form [formGroup]="form" (ngSubmit)="enviarRecuperacao()">

            <input formControlName="email" type="email" placeholder="E-mail" />

            <button type="submit" [disabled]="loading">
                @if(loading){
                Enviando...
                } @else {
                Enviar instruções
                }
            </button>

            @if(enviado){
            <p class="sucesso">Enviamos as instruções para o seu e-mail.</p>
            }

        </form>

        <button type="button" class="back-button" (click)="voltarParaLogin()">
            ← Voltar para login
        </button>

    </div>

</div>
