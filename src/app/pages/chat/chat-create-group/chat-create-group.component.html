<div class="grupo-page">
  <div class="grupo-header">
    <button class="btn-voltar" (click)="voltar()" aria-label="Voltar">←</button>
    <h2>{{ 'chat.group.title' | translate }}</h2>
  </div>

  @if (!codigoCriado()) {
    <div class="grupo-form">
      <label for="nomeGrupo">{{ 'chat.group.name-label' | translate }}</label>
      <input
        id="nomeGrupo"
        type="text"
        [value]="nomeGrupo()"
        (input)="nomeGrupo.set($any($event.target).value)"
        (keydown.enter)="criar()"
        placeholder="Ex: Campistas do Sul"
        maxlength="100"
        [disabled]="criando()"
      />

      @if (erro()) {
        <p class="erro">{{ erro() }}</p>
      }

      <button class="btn-criar" (click)="criar()" [disabled]="!nomeGrupo().trim() || criando()">
        {{
          criando()
            ? ('chat.group.btn-creating' | translate)
            : ('chat.group.btn-create' | translate)
        }}
      </button>
    </div>
  } @else {
    <div class="grupo-sucesso">
      <span class="sucesso-icon">🎉</span>
      <h3>{{ 'chat.group.success' | translate }}</h3>
      <p>{{ 'chat.group.invite-text' | translate }}</p>
      <div class="codigo-box">
        <span class="codigo">{{ codigoCriado() }}</span>
        <button class="btn-copiar" (click)="copiarCodigo()" aria-label="Copiar código">
          {{ 'chat.group.btn-copy' | translate }}
        </button>
      </div>
      <button class="btn-ir-grupo" (click)="irParaGrupo()">
        {{ 'chat.group.btn-go-chats' | translate }}
      </button>
    </div>
  }
</div>
