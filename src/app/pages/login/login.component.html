<div class="login-container auth-bg">
  <div class="login-card glass-card">
    <div class="logo" role="img" [attr.aria-label]="'app.name' | translate"></div>

    <h2>{{ 'auth.welcome' | translate }}</h2>

    <label for="login-email" class="sr-only">{{ 'auth.email' | translate }}</label>
    <input
      id="login-email"
      type="email"
      [placeholder]="'auth.email' | translate"
      [(ngModel)]="email"
      autocomplete="email"
    />

    <label for="login-senha" class="sr-only">{{ 'auth.password' | translate }}</label>
    <input
      id="login-senha"
      type="password"
      [placeholder]="'auth.password' | translate"
      [(ngModel)]="senha"
      autocomplete="current-password"
    />

    <button (click)="entrar()" [disabled]="loading">
      @if (loading) {
        {{ 'auth.logging-in' | translate }}
      } @else {
        {{ 'auth.login' | translate }}
      }
    </button>

    <div class="divider" role="separator">
      <span>{{ 'auth.or' | translate }}</span>
    </div>

    <div
      #googleButton
      class="google-button-container"
      [attr.aria-label]="'auth.login-google' | translate"
    ></div>

    <div class="login-secondary">
      <button type="button" class="link-button" (click)="recuperarSenha()">
        {{ 'auth.forgot-password' | translate }}
      </button>
    </div>
    <button type="button" class="btn_hover" (click)="criarConta()">
      {{ 'auth.register' | translate }}
    </button>

    @if (erro) {
      <p class="erro" role="alert">
        {{ erro }}
      </p>
    }

    <p class="legal-links">
      <a routerLink="/termos">Termos de Uso</a>
      &nbsp;·&nbsp;
      <a routerLink="/privacidade">Privacidade</a>
    </p>
  </div>
</div>
