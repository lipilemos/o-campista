<div class="login-container">

  <div class="login-card">

    <div class="logo">
    </div>

    <h2>Bem-vindo</h2>

    <input type="email" placeholder="Email" [(ngModel)]="email" />

    <input type="password" placeholder="Senha" [(ngModel)]="senha" />

    <button (click)="entrar()" [disabled]="loading">

      @if(loading){
      Entrando...
      } @else {
      Entrar
      }

    </button>

    <div class="login-secondary">
      <button type="button" class="link-button" (click)="recuperarSenha()">Esqueceu a senha?</button>
    </div>
    <button type="button" class="btn_hover" (click)="criarConta()">Criar conta</button>

    @if(erro){
    <p class="erro">
      {{ erro }}
    </p>
    }

  </div>

</div>
