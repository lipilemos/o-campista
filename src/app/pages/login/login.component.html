<div class="login-container auth-bg">
  <div class="login-card glass-card">
    <div class="logo" role="img" aria-label="Logo O Campista"></div>

    <h2>Bem-vindo</h2>

    <label for="login-email" class="sr-only">E-mail</label>
    <input id="login-email" type="email" placeholder="Email" [(ngModel)]="email" autocomplete="email" />

    <label for="login-senha" class="sr-only">Senha</label>
    <input id="login-senha" type="password" placeholder="Senha" [(ngModel)]="senha" autocomplete="current-password" />

    <button (click)="entrar()" [disabled]="loading">
      @if (loading) {
        Entrando...
      } @else {
        Entrar
      }
    </button>

    <div class="divider" role="separator">
      <span>ou</span>
    </div>

    <div #googleButton class="google-button-container" aria-label="Entrar com Google"></div>

    <div class="login-secondary">
      <button type="button" class="link-button" (click)="recuperarSenha()">
        Esqueceu a senha?
      </button>
    </div>
    <button type="button" class="btn_hover" (click)="criarConta()">Criar conta</button>

    @if (erro) {
      <p class="erro" role="alert">
        {{ erro }}
      </p>
    }
  </div>
</div>
